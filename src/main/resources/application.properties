spring.application.name=EMS_backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD}}

jwt.secret=${JWT_SECRET:my_super_secret_key_for_jwt_which_is_long_enough_12345}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:${CLOUDINARY_CLOUD_NAME_LEGACY}}
cloudinary.api-key=${CLOUDINARY_API_KEY:${CLOUDINARY_API_KEY_LEGACY}}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:${CLOUDINARY_API_SECRET_LEGACY}}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.type=${SPRING_CACHE_TYPE:simple}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
